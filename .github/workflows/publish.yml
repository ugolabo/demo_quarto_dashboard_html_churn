name: Quarto Publish

on:
  push:
    branches: [ main ]  # launch on push to main branch
  workflow_dispatch:  # manual launch from Actions in Github

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install GDAL and spatial dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libsqlite3-dev libudunits2-dev

      - name: Install Dependencies
        run: |
          Rscript -e "install.packages('renv')"
          Rscript -e "renv::restore()"
# Instead of run: |
#        run: |
#          Rscript -e "install.packages(c('knitr', 'ggplot2', 'gridExtra', 'ggthemes', 'eha', 'survival', 'kableExtra'))"
# Use renv
# install.packages("renv")
# renv::settings$snapshot.type("packrat")
# for only what is in the dependencies.R script (project used in the project)
# renv::init()
# renv.lock   for all projects packages, dependencies and their versions
# .Rprofile
# renv/
# after init(), install new package with install.packages(), add it with renv::snapshot()
      - name: Create gh-pages branch if missing
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if ! git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            echo "Branch gh-pages not found. Creating it..."
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initial gh-pages branch"
            git push origin gh-pages
            git checkout main
          fi

      - name: List files for debugging
        run: |
          echo "Contenu du répertoire racine :"
          ls -R

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
