name: Quarto Publish

on:
  push:
    branches: [ main ]  # launch on push to main branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Dependencies
         run: |
          Rscript -e "install.packages('renv')"
          Rscript -e "renv::restore()"
# Instead of run: |
#        run: |
#          Rscript -e "install.packages(c('knitr', 'ggplot2', 'gridExtra', 'ggthemes', 'eha', 'survival', 'kableExtra'))"
# Use renv
# install.packages("renv")
# renv::settings$snapshot.type("packrat")
# for only what is in the dependencies.R script (project used in the project)
# renv::init()
# renv.lock   for all projects packages, dependencies and their versions
# .Rprofile
# renv/
# after init(), install new package with install.packages(), add it with renv::snapshot()

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
